version: "3.9"
services: 
  mongodb: 
    image: mongo
    ports:
      - '27017:27017'
    container_name: mongodb
    volumes:
      - solve-tracker-db:/data/db

  backend: 
    build: .
    ports: 
      - '5000:5000'
    container_name: backend
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017

volumes:
  solve-tracker-db: